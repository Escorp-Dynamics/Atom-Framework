<!DOCTYPE html>
<html>
    <head>
        <title>Turnstile Zero</title>
        <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    </head>
    <body>
        <div class="cf-turnstile"
             data-sitekey="3x00000000000000000000FF"
             data-appearance="always"
             data-error-callback="__tsError"
             data-callback="__tsSuccess"
             data-expired-callback="__tsExpired"></div>
        <script>
            function __tsError(code) { document.documentElement.dataset.tsError = code; }
            function __tsSuccess(token) { document.documentElement.dataset.tsToken = token; }
            function __tsExpired() { document.documentElement.dataset.tsExpired = 'yes'; }
        </script>
    </body>
</html>
